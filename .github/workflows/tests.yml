name: Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 8 — PHP 8.0
          - php: '8.0'
            laravel: '8.*'
            testbench: '6.*'
            phpunit: '9.*'
          # Laravel 9 — PHP 8.0 / 8.1
          - php: '8.0'
            laravel: '9.*'
            testbench: '7.*'
            phpunit: '9.*'
          - php: '8.1'
            laravel: '9.*'
            testbench: '7.*'
            phpunit: '10.*'
          # Laravel 10 — PHP 8.1 / 8.2
          - php: '8.1'
            laravel: '10.*'
            testbench: '8.*'
            phpunit: '10.*'
          - php: '8.2'
            laravel: '10.*'
            testbench: '8.*'
            phpunit: '10.*'
          # Laravel 11 — PHP 8.2 / 8.3
          - php: '8.2'
            laravel: '11.*'
            testbench: '9.*'
            phpunit: '11.*'
          - php: '8.3'
            laravel: '11.*'
            testbench: '9.*'
            phpunit: '11.*'
          # Laravel 12 — PHP 8.2 / 8.3
          - php: '8.2'
            laravel: '12.*'
            testbench: '10.*'
            phpunit: '11.*'
          - php: '8.3'
            laravel: '12.*'
            testbench: '10.*'
            phpunit: '11.*'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite3, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: |
          composer require \
            "illuminate/support:${{ matrix.laravel }}" \
            "illuminate/console:${{ matrix.laravel }}" \
            "illuminate/container:${{ matrix.laravel }}" \
            "illuminate/database:${{ matrix.laravel }}" \
            "illuminate/filesystem:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            "phpunit/phpunit:${{ matrix.phpunit }}" \
            --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: ./vendor/bin/phpunit --exclude-group integration
